spring:
  application:
    name: spring-security-tutor
  datasource:
    url: jdbc:h2:mem:securitydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  error:
    include-message: always

security:
  jwt:
    issuer: spring-security-tutor
    access-token-ttl: 15m
    refresh-token-ttl: 7d
    secret: "replace-this-with-a-very-long-secret-key-at-least-32-bytes"

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
