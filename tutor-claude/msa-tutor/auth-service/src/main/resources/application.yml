server:
  port: 8090

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:authdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

security:
  jwt:
    issuer: msa-tutor
    secret: "replace-this-with-a-very-long-secret-key-at-least-32-bytes"
    access-token-minutes: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
