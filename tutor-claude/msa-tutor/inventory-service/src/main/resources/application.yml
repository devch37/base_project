server:
  port: 8083

spring:
  application:
    name: inventory-service
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false
    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: be.com.msatutor.common.event,java.util

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

msa:
  topics:
    order-created: order.created.v1
    order-cancelled: order.cancelled.v1
    inventory-reserved: inventory.reserved.v1
    inventory-reservation-failed: inventory.reservation.failed.v1
    inventory-released: inventory.released.v1
    inventory-reserve-command: inventory.reserve.command.v1
    inventory-release-command: inventory.release.command.v1
