server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: be.com.msatutor.common.event,java.util

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

outbox:
  poll-interval-ms: 2000

saga:
  step-timeout-ms: 15000
  max-retries: 3
  base-backoff-ms: 2000
  retry-scan-ms: 5000

msa:
  topics:
    order-created: order.created.v1
    order-cancelled: order.cancelled.v1
    order-completed: order.completed.v1
    payment-approved: payment.approved.v1
    payment-failed: payment.failed.v1
    inventory-reserved: inventory.reserved.v1
    inventory-reservation-failed: inventory.reservation.failed.v1
    inventory-released: inventory.released.v1
    inventory-reserve-command: inventory.reserve.command.v1
    inventory-release-command: inventory.release.command.v1
    payment-authorize-command: payment.authorize.command.v1
